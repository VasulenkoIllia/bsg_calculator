# Local development services.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down       # stops, keeps data
#   docker compose -f docker-compose.dev.yml down -v    # stops, WIPES data
#
# Production deployment uses a separate docker-compose.yml in Sprint 7.

services:
  postgres:
    image: postgres:15-alpine
    container_name: bsg-postgres-dev
    restart: unless-stopped
    ports:
      # Bound to localhost only so other machines on the LAN can't connect.
      # 5433 (not 5432) to coexist with a local Postgres on the host.
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: bsg
      POSTGRES_PASSWORD: bsg_dev_password
      POSTGRES_DB: bsg_calculator
      # Track table creation timestamps + collation defaults match production.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - bsg_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsg -d bsg_calculator"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bsg_postgres_dev_data:
    name: bsg_postgres_dev_data
